name: douban

on: 
  schedule:
    - cron: "0 */6 * * *"
  push:
    branches:
      - main
  watch:
    types: [started]
  workflow_dispatch:

jobs:
  douban:
    if: ${{ github.actor != 'github-actions[bot]' }}
    name: Douban mark data sync
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: 20

    - name: movies sync
      uses: haeward/doumark@v2.0.0
      with:
        id: mithrasu
        type: movie
        format: json
        dir: ./data/douban

    - name: books sync
      uses: haeward/doumark@v2.0.0
      with:
        id: mithrasu
        type: book
        format: json
        dir: ./data/douban

    - name: Download covers
      run: node scripts/sync-douban-covers.mjs

    - name: Import GPG key
      uses: crazy-max/ghaction-import-gpg@v7
      with:
        gpg_private_key: ${{ secrets.CI_GPG_PRIVATE_KEY }}
        passphrase: ${{ secrets.CI_GPG_PASSPHRASE }}
        git_user_signingkey: true
        git_commit_gpgsign: true

    - name: Commit
      run: |
        git config user.name "${{ secrets.CI_GIT_USER_NAME }}"
        git config user.email "${{ secrets.CI_GIT_USER_EMAIL }}"
        git add ./data/douban ./public/douban
        if git diff --cached --quiet; then
          echo "No changes to commit."
          exit 0
        fi
        git commit -S -m "chore: update douban data"
        git push
